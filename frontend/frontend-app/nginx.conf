server {
    listen 80;
    server_name localhost;

    # 1. 托管 React 静态页面
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # 解决 React 路由刷新 404 问题
    }

    # 2. 拦截 /api 开头的请求并转发给后端容器
    location /api/ {
        # 这里的 backend 是 docker-compose 中的服务名，8080 是 .NET 8 默认端口
        # 注意：如果你的 C# 路由本身自带 /api (如 [Route("api/[controller]")]), 这里写 proxy_pass http://backend:8080/api/;
        # 如果 C# 路由不带 /api，写 proxy_pass http://backend:8080/; (Nginx 会自动去掉 /api 前缀)
        proxy_pass http://backend:8080/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}